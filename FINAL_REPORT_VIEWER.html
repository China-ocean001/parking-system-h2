# 停车场管理系统 - 课程设计报告

## 1 需求分析

### 1.1 需求分析概述
随着城市车辆保有量的急剧增加，传统的人工停车管理模式已难以满足高效、准确、实时的管理需求。本系统旨在开发一套基于 Web 的现代化停车场管理系统，服务于**系统管理员**和**普通车主**两类用户。通过本系统，可以实现车辆进出的自动化管理、费用的自动结算、车位资源的实时监控与预约，以及对违规车辆和黑名单车辆的管控。

**系统预期功能**：
1.  **基础管理**：实现用户（管理员/车主）的注册、登录及权限划分；实现车位资源的数字化管理（增删改查）。
2.  **核心业务**：
    *   **入场管理**：自动记录车辆入场时间，强制校验车辆是否在黑名单中或是否存在未支付的历史订单，若存在则拒绝入场。
    *   **出场计费**：根据入场时间自动计算停车时长和费用（支持免费车牌逻辑），更新车位状态为“空闲”。
    *   **预约服务**：车主可在线查看空闲车位并进行预约，系统在车辆实际入场时自动关联预约记录。
3.  **安全管控**：管理员可登记车辆违规行为，并对严重违规或长期欠费车辆实施黑名单管理，系统自动拦截黑名单车辆。

### 1.3 各子系统的数据流图
1.  **车辆入场子系统**：
    *   输入：车牌号码。
    *   处理：查询黑名单表 -> 查询未支付记录表 -> 查询预约表 -> 生成停车记录 -> 更新车位状态。
    *   输出：入场通知/拒绝原因。
2.  **车辆出场/计费子系统**：
    *   输入：车位ID。
    *   处理：读取入场记录 -> 计算时长 -> 匹配免费车牌表 -> 计算费用 -> 更新停车记录（费用、出场时间） -> 释放车位。
    *   输出：缴费通知单。

## 2 概要设计

### 2.1 系统功能模块设计
系统采用 B/S (Browser/Server) 架构，后端基于 Spring Boot 框架，采用经典的 MVC 分层设计模式。
*   **停车场管理系统**
    *   **用户模块**：登录、注册、个人中心。
    *   **车位模块**：车位展示、车位状态管理、车位 CRUD（管理员）。
    *   **业务模块**：车辆入场、车辆出场、费用支付、车位预约。
    *   **风控模块**：黑名单管理、违规记录、免费车牌设置。

### 2.2 数据库概念结构设计 (E-R图)

*   **关系 (Relationship)**：使用 **菱形** 表示。
*   **基数 (Cardinality)**：线段上标注 1:1, 1:N, M:N。

#### 2.2.3 实体与属性说明
严格遵循数据字典定义，核心实体说明如下：

1.  **用户 (User)**
    *   **主键**：`用户ID` (Long, PK) - 唯一标识。
    *   **属性**：`用户名` (String, Not Null), `密码` (String), `角色` (String, 枚举: ADMIN/USER)。
    *   **语义**：系统的注册使用者，分为管理员和普通车主。

2.  **车位 (ParkingSpace)**
    *   **主键**：`车位ID` (Long, PK)。
    *   **属性**：`车位编号` (String, Unique), `状态` (Int, 0-空闲/1-占用/2-预约), `备注` (String)。
    *   **语义**：物理停车位资源。

3.  **停车记录 (ParkingRecord)**
    *   **主键**：`记录ID` (Long, PK)。
    *   **属性**：`车牌号` (String), `入场时间` (Datetime), `出场时间` (Datetime), `费用` (Decimal), `支付状态` (Int)。
    *   **外键**：`Space_ID` (FK) -> 关联 `车位` 实体。
    *   **语义**：记录车辆一次完整的停车过程。

4.  **预约 (Reservation)**
    *   **主键**：`预约ID` (Long, PK)。
    *   **属性**：`车牌号` (String), `预约时间` (Datetime), `状态` (Int)。
    *   **外键**：`User_ID` (FK) -> 关联 `用户`, `Space_ID` (FK) -> 关联 `车位`。
    *   **语义**：用户对特定车位的预定行为。

#### 2.2.4 关系说明
1.  **发起 (Initiate)**
    *   **关联实体**：用户 (1) —— 预约 (N)
    *   **语义**：一个用户可以发起多次预约，一条预约记录必须属于一个用户。
    
2.  **占用 (Occupy)**
    *   **关联实体**：车位 (1) —— 预约 (N)
    *   **语义**：一个车位在不同时间段可以被多次预约（历史记录），但同一时刻只能有一条有效预约。

3.  **产生 (Generate)**
    *   **关联实体**：车位 (1) —— 停车记录 (N)
    *   **语义**：车辆停入车位后产生停车记录。

4.  **匹配 (Match)**
    *   **关联实体**：免费车牌 (1) —— 停车记录 (N)
    *   **语义**：停车记录结算时，若车牌匹配免费车牌表，则费用减免。

#### 2.2.5 约束说明 (Constraints)
*   **主键约束 (PK)**：所有实体均设有 `id` 作为主键，保证实体唯一性。
*   **外键约束 (FK)**：
    *   `reservation.user_id` 引用 `sys_user.id`。
    *   `reservation.space_id` 引用 `parking_space.id`。
    *   `parking_record.space_id` 引用 `parking_space.id`。
*   **唯一约束 (Unique)**：
    *   `sys_user.username`：用户名不可重复。
    *   `parking_space.space_number`：车位编号不可重复。
    *   `free_plate.plate_number`：免费车牌号不可重复。

## 3 逻辑结构设计和实施

### 3.1 关系模式的转换
根据概念模型，系统包含以下核心关系模式：
1.  **sys_user** (<u>id</u>, username, password, role, create_time)
2.  **parking_space** (<u>id</u>, space_number, status, remark)
3.  **parking_record** (<u>id</u>, plate_number, space_id, entry_time, exit_time, fee, status, payment_status)
    *   外键：space_id -> parking_space(id)
4.  **reservation** (<u>id</u>, user_id, space_id, plate_number, reserve_time, status)
    *   外键：user_id -> sys_user(id), space_id -> parking_space(id)
5.  **blacklist** (<u>id</u>, plate_number, reason, create_time)
6.  **free_plate** (<u>id</u>, plate_number, description)
7.  **violation_record** (<u>id</u>, plate_number, violation_type, description, record_time)

### 3.2 关系模式的优化
系统所有关系模式均满足 **第三范式 (3NF)**：
*   **1NF**：所有字段均为原子值，不可再分。
*   **2NF**：主键均为单列 ID，不存在非主属性对主键的部分依赖。
*   **3NF**：不存在非主属性对主键的传递依赖。例如，`parking_record` 中直接存储 `fee` 而非只存时长，虽然 `fee` 可由时长计算得出，但考虑到费率可能随时间调整，为了保证历史账单的不可变性，将费用固化存储符合业务需求，且不违反 3NF 关于依赖传递的定义。

### 3.5 数据库高级特性实现

为了提升系统性能和简化复杂查询，设计了以下视图和索引。

#### 3.5.1 视图设计 (Views)
设计 `v_parking_details` 视图，用于管理员快速查看当前所有停车详情（关联车位表和记录表）。
```sql
CREATE VIEW v_parking_details AS
SELECT 
    r.id AS record_id,
    s.space_number,
    r.plate_number,
    r.entry_time,
    TIMESTAMPDIFF(MINUTE, r.entry_time, NOW()) AS duration_minutes
FROM parking_record r
JOIN parking_space s ON r.space_id = s.id
WHERE r.status = 0; -- 仅查询当前在场车辆
```

#### 3.5.2 索引设计 (Indexes)
为了加快高频查询的速度，在核心字段上建立索引：
1.  **车牌号索引**：加快黑名单检查和欠费查询。
    ```sql
    CREATE INDEX idx_record_plate ON parking_record(plate_number);
    CREATE INDEX idx_blacklist_plate ON blacklist(plate_number);
    ```
2.  **状态索引**：加快空闲车位查询。
    ```sql
    CREATE INDEX idx_space_status ON parking_space(status);
    ```

### 3.6 设计存储过程
为了实现“计算停车费用”的数据库层封装，设计如下存储过程（示例）：
```sql
CREATE PROCEDURE CalculateParkingFee(IN recordId BIGINT, OUT parkingFee DECIMAL(10,2))
BEGIN
    DECLARE entryTime TIMESTAMP;
    DECLARE exitTime TIMESTAMP;
    DECLARE durationHours INT;
    
    SELECT entry_time, exit_time INTO entryTime, exitTime 
    FROM parking_record WHERE id = recordId;
    
    -- 计算小时数（向上取整）
    SET durationHours = CEIL(TIMESTAMPDIFF(MINUTE, entryTime, exitTime) / 60.0);
    
    -- 基础费率 5元/小时
    SET parkingFee = durationHours * 5.00;
    
    UPDATE parking_record SET fee = parkingFee WHERE id = recordId;
END;
```
*(注：实际项目中该逻辑在 Java Service 层实现以获得更好的跨平台性，此处为满足课程设计要求的数据库层实现示例)*

### 3.7 设计触发器
为了保证数据完整性，设计触发器：当车辆入场产生记录时，自动将车位状态更新为“占用”。
```sql
CREATE TRIGGER AfterEntryInsert
AFTER INSERT ON parking_record
FOR EACH ROW
BEGIN
    UPDATE parking_space 
    SET status = 1 
    WHERE id = NEW.space_id;
END;
```

### 3.8 SQL代码实现
```sql
-- 1. 用户表
CREATE TABLE sys_user (
    id BIGINT AUTO_INCREMENT PRIMARY KEY,
    username VARCHAR(50) NOT NULL,
    password VARCHAR(100) NOT NULL,
    role VARCHAR(20) DEFAULT 'USER',
    create_time TIMESTAMP DEFAULT CURRENT_TIMESTAMP
);

-- 2. 停车位表
CREATE TABLE parking_space (
    id BIGINT AUTO_INCREMENT PRIMARY KEY,
    space_number VARCHAR(20) NOT NULL,
    status INT DEFAULT 0, -- 0-空闲, 1-占用, 2-已预约
    remark VARCHAR(200)
);

-- 3. 停车记录表
CREATE TABLE parking_record (
    id BIGINT AUTO_INCREMENT PRIMARY KEY,
    plate_number VARCHAR(20) NOT NULL,
    space_id BIGINT NOT NULL,
    entry_time TIMESTAMP NOT NULL,
    exit_time TIMESTAMP,
    fee DECIMAL(10, 2),
    status INT DEFAULT 0, -- 0-停车中, 1-已出场
    payment_status INT DEFAULT 0, -- 0-未支付, 1-已支付
    FOREIGN KEY (space_id) REFERENCES parking_space(id)
);

-- 4. 免费车牌表
CREATE TABLE free_plate (
    id BIGINT AUTO_INCREMENT PRIMARY KEY,
    plate_number VARCHAR(20) NOT NULL UNIQUE,
    description VARCHAR(200)
);

-- 5. 预约记录表
CREATE TABLE reservation (
    id BIGINT AUTO_INCREMENT PRIMARY KEY,
    user_id BIGINT NOT NULL,
    space_id BIGINT NOT NULL,
    plate_number VARCHAR(20) NOT NULL,
    reserve_time TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
    status INT DEFAULT 0, -- 0-有效, 1-已使用, 2-已取消
    FOREIGN KEY (user_id) REFERENCES sys_user(id),
    FOREIGN KEY (space_id) REFERENCES parking_space(id)
);

-- 6. 黑名单表
CREATE TABLE blacklist (
    id BIGINT AUTO_INCREMENT PRIMARY KEY,
    plate_number VARCHAR(20) NOT NULL UNIQUE,
    reason VARCHAR(200),
    create_time TIMESTAMP DEFAULT CURRENT_TIMESTAMP
);

-- 7. 违规记录表
CREATE TABLE violation_record (
    id BIGINT AUTO_INCREMENT PRIMARY KEY,
    plate_number VARCHAR(20) NOT NULL,
    violation_type VARCHAR(50) NOT NULL,
    description VARCHAR(200),
    record_time TIMESTAMP DEFAULT CURRENT_TIMESTAMP
);
```

## 6 详细设计

### 6.1 预定车位
**功能描述**：允许注册用户查看当前状态为“空闲”的车位，并提交预约申请。预约成功后，该车位状态将变更为“已预约”，其他用户不可再操作。

**业务流程**：
1.  用户登录系统，进入“车位管理”页面。
2.  系统查询 `parking_space` 表，筛选 `status=0` (空闲) 的记录。
3.  用户点击“预约”按钮，填写预约车牌号。
4.  **后台校验**：
    *   检查用户是否已有未完成的预约（防止恶意占位）。
    *   检查该车牌是否在黑名单 (`blacklist`) 中。
    *   检查该车牌是否有未支付的欠费记录 (`parking_record` 中 `payment_status=0`)。
5.  **执行预约**：
    *   在 `reservation` 表插入一条新记录，状态为有效。
    *   更新 `parking_space` 表中对应车位的 `status` 为 `2` (已预约)。
6.  **反馈结果**：向用户显示“预约成功”提示。

**关键代码实现 (ParkingService.java)**：
```java
@Transactional
public void reserveSpace(Long userId, Long spaceId, String plateNumber) {
    // 1. 基础校验 (黑名单、欠费)
    checkBlacklistAndUnpaid(plateNumber);

    // 2. 乐观锁检查车位状态
    ParkingSpace space = parkingSpaceMapper.findById(spaceId);
    if (space == null || space.getStatus() != 0) {
        throw new RuntimeException("车位已被占用或不存在");
    }
    
    // 3. 更新车位状态为已预约 (Status=2)
    space.setStatus(2);
    parkingSpaceMapper.updateStatus(space);

    // 4. 创建预约记录
    Reservation res = new Reservation();
    res.setUserId(userId);
    res.setSpaceId(spaceId);
    res.setPlateNumber(plateNumber);
    res.setStatus(0); // 0=有效
    reservationMapper.insert(res);
}
```

### 6.2 车辆入场
**功能描述**：车辆到达停车场入口，管理员或系统识别车牌后放行。
**逻辑设计**：
1.  校验黑名单与欠费。
2.  若车位状态为“已预约” (`status=2`)，则校验入场车牌是否与预约车牌一致。
3.  若一致或车位为空闲，允许入场。
4.  在 `parking_record` 插入记录，记录 `entry_time`。
5.  更新 `parking_space` 状态为 `1` (占用)。

### 6.3 车辆出场与计费
**功能描述**：车辆离开时，系统计算费用并更新状态。
**逻辑设计**：
1.  根据 `entry_time` 和当前时间计算停车时长。
2.  查询 `free_plate` 表，若在免费名单中，费用置为 0。
3.  否则按 5元/小时 标准计费 (向上取整)。
4.  更新 `parking_record` 的 `exit_time`, `fee`, `status=1` (已出场)。
5.  更新 `parking_space` 状态为 `0` (空闲)。

## 7 调试分析

在系统开发与调试过程中，遇到了以下主要问题并成功解决：

1.  **404 路径错误问题**
    *   **现象**：在 IntelliJ IDEA 中使用外部 Tomcat 运行 WAR 包时，访问登录页面报 404 错误，或者登录后跳转失败。
    *   **原因分析**：外部 Tomcat 部署时通常会带上项目名作为 Context Path (例如 `/parking_system/login`)，而代码中使用了硬编码的绝对路径 (如 `/login`)，导致路径不匹配。
    *   **解决方案**：修改所有 HTML 模板文件，使用 Thymeleaf 的标准路径语法 `@{/login}`。这样 Thymeleaf 渲染时会自动在路径前加上 Context Path，确保在任何部署环境下路径都正确。同时，修改启动类继承 `SpringBootServletInitializer` 以支持 WAR 包部署。

2.  **H2 数据库文件锁问题**
    *   **现象**：启动项目时报错 `Database may be already in use: "Locked by another process"`。
    *   **原因分析**：最初配置使用 H2 的文件模式 (`jdbc:h2:file:./data/db`)，当项目异常退出或有多个实例运行时，数据库文件会被锁定。
    *   **解决方案**：将数据库配置修改为内存模式 (`jdbc:h2:mem:parking_db`)。虽然内存模式下重启会丢失数据，但对于开发调试和课程设计演示来说，环境更纯净，且彻底解决了文件锁冲突问题。

3.  **中文乱码与错误提示优化**
    *   **现象**：入场校验失败时（如黑名单拦截），前端显示的错误信息是乱码或不友好的堆栈信息。
    *   **解决方案**：在 `application.properties` 中强制设置编码为 UTF-8。在 Controller 层使用 `try-catch` 捕获业务异常，并通过 `RedirectAttributes` 将友好的中文错误信息传递给前端页面显示。
