# Database Configuration
# ----------------------------------------
# 使用内存数据库 (In-Memory)，确保每次启动都是干净的环境
# ----------------------------------------

# === H2 Database Configuration (In-Memory) ===
# DB_CLOSE_DELAY=-1 保持数据库在虚拟机运行期间一直存在
spring.datasource.url=jdbc:h2:mem:parking_db;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# 启动时初始化 schema.sql (Spring Boot 2.7+ 默认行为)
spring.sql.init.mode=always
spring.sql.init.encoding=UTF-8

# H2 Console (访问 http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# MyBatis Configuration
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.configuration.map-underscore-to-camel-case=true
# Enable MyBatis Logging
logging.level.com.parking.mapper=DEBUG

# Thymeleaf
spring.thymeleaf.cache=false

# Error Handling
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=always
server.error.include-exception=true

# General Logging
logging.level.root=INFO
logging.level.com.parking=DEBUG
logging.level.org.springframework.web=INFO
