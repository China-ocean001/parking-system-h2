<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>黑名单管理 - 停车场管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">停车场管理系统</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" th:href="@{/dashboard}">车位管理</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/records}">停车记录</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/reservations}">我的预约</a></li>
                    <li class="nav-item dropdown" th:if="${session.user.role == 'ADMIN'}">
                        <a class="nav-link dropdown-toggle active" href="#" id="adminDropdown" role="button" data-bs-toggle="dropdown">
                            管理员功能
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" th:href="@{/admin/users}">用户管理</a></li>
                            <li><a class="dropdown-item" th:href="@{/admin/free-plates}">免费车牌</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item active" th:href="@{/admin/blacklist}">黑名单管理</a></li>
                            <li><a class="dropdown-item" th:href="@{/admin/violations}">违规记录</a></li>
                        </ul>
                    </li>
                </ul>
                <a th:href="@{/logout}" class="btn btn-outline-light btn-sm">退出登录</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <!-- Add Blacklist Form -->
        <div class="card mb-4 border-danger">
            <div class="card-header bg-danger text-white">添加黑名单车辆 (禁止入场)</div>
            <div class="card-body">
                <form th:action="@{/admin/blacklist/add}" method="post" class="row g-3">
                    <div class="col-auto">
                        <input type="text" class="form-control" name="plateNumber" placeholder="车牌号 (如: BAD-001)" required>
                    </div>
                    <div class="col-auto">
                        <input type="text" class="form-control" name="reason" placeholder="拉黑原因 (如: 长期欠费)" required>
                    </div>
                    <div class="col-auto">
                        <button type="submit" class="btn btn-danger">加入黑名单</button>
                    </div>
                </form>
            </div>
        </div>

        <h3>黑名单列表</h3>
        <div class="table-responsive">
            <table class="table table-striped table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>车牌号</th>
                        <th>拉黑原因</th>
                        <th>拉黑时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="bl : ${blacklist}">
                        <td th:text="${bl.id}">1</td>
                        <td th:text="${bl.plateNumber}" class="fw-bold text-danger">BAD-001</td>
                        <td th:text="${bl.reason}">欠费</td>
                        <td th:text="${#dates.format(bl.createTime, 'yyyy-MM-dd HH:mm:ss')}">2023-01-01</td>
                        <td>
                            <a th:href="@{/admin/blacklist/delete(id=${bl.id})}" class="btn btn-secondary btn-sm" onclick="return confirm('确定移除黑名单吗？')">移除</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
