<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>控制台 - 停车场管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .space-card { height: 100%; transition: all 0.3s; }
        .space-card:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .status-free { background-color: #d1e7dd; border-color: #badbcc; color: #0f5132; }
        .status-occupied { background-color: #f8d7da; border-color: #f5c6cb; color: #842029; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">停车场管理系统</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link active" th:href="@{/dashboard}">车位管理</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/records}">停车记录</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/reservations}">我的预约</a></li>
                    <li class="nav-item dropdown" th:if="${session.user.role == 'ADMIN'}">
                        <a class="nav-link dropdown-toggle" href="#" id="adminDropdown" role="button" data-bs-toggle="dropdown">
                            管理员功能
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" th:href="@{/admin/users}">用户管理</a></li>
                            <li><a class="dropdown-item" th:href="@{/admin/free-plates}">免费车牌</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" th:href="@{/admin/blacklist}">黑名单管理</a></li>
                            <li><a class="dropdown-item" th:href="@{/admin/violations}">违规记录</a></li>
                        </ul>
                    </li>
                </ul>
                <span class="navbar-text me-3">
                    欢迎, <span th:text="${user.username}">User</span>
                </span>
                <a th:href="@{/logout}" class="btn btn-outline-light btn-sm">退出登录</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <!-- Error Alert -->
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <strong th:text="${error}">Error Message</strong>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <!-- Add Space Form (Admin only) -->
        <div class="card mb-4" th:if="${user.role == 'ADMIN'}">
            <div class="card-header">添加新车位</div>
            <div class="card-body">
                <form th:action="@{/space/add}" method="post" class="row g-3">
                    <div class="col-auto">
                        <input type="text" class="form-control" name="spaceNumber" placeholder="车位编号 (如 A001)" required>
                    </div>
                    <div class="col-auto">
                        <input type="text" class="form-control" name="remark" placeholder="备注">
                    </div>
                    <div class="col-auto">
                        <button type="submit" class="btn btn-success">添加车位</button>
                    </div>
                </form>
            </div>
        </div>

        <h3 class="mb-3">车位状态</h3>
        <div class="row">
            <div class="col-md-3 mb-4" th:each="space : ${spaces}">
                <div class="card h-100 shadow-sm" th:classappend="${space.status == 1 ? 'border-danger' : (space.status == 2 ? 'border-warning' : 'border-success')}">
                    <div class="card-body text-center">
                        <h5 class="card-title" th:text="${space.spaceNumber}">A001</h5>
                        <p class="card-text">
                            <span th:if="${space.status == 0}" class="badge bg-success">空闲</span>
                            <span th:if="${space.status == 1}" class="badge bg-danger">占用</span>
                            <span th:if="${space.status == 2}" class="badge bg-warning text-dark">已预约</span>
                        </p>
                        <p class="small text-muted" th:text="${space.remark}">备注</p>
                        
                        <!-- Operations -->
                        <div class="d-grid gap-2">
                            <button th:if="${space.status == 0}" class="btn btn-primary btn-sm" data-bs-toggle="modal" th:data-bs-target="'#entryModal'+${space.id}">车辆入场</button>
                            <button th:if="${space.status == 0}" class="btn btn-warning btn-sm" data-bs-toggle="modal" th:data-bs-target="'#reserveModal'+${space.id}">预约车位</button>
                            
                            <form th:if="${space.status == 1}" th:action="@{/vehicle/exit}" method="post">
                                <input type="hidden" name="spaceId" th:value="${space.id}">
                                <button type="submit" class="btn btn-danger btn-sm w-100">车辆出场</button>
                            </form>
                            
                            <button th:if="${space.status == 2}" class="btn btn-secondary btn-sm w-100" data-bs-toggle="modal" th:data-bs-target="'#entryModal'+${space.id}">预约入场</button>
                            
                            <a th:if="${session.user.role == 'ADMIN'}" th:href="@{/space/delete(id=${space.id})}" class="btn btn-outline-danger btn-sm mt-2" onclick="return confirm('确定删除该车位吗？')">删除</a>
                        </div>

                        <!-- Entry Modal -->
                        <div class="modal fade" th:id="'entryModal'+${space.id}" tabindex="-1">
                            <div class="modal-dialog">
                                <div class="modal-content">
                                    <form th:action="@{/vehicle/entry}" method="post">
                                        <div class="modal-header">
                                            <h5 class="modal-title">车辆入场 - <span th:text="${space.spaceNumber}"></span></h5>
                                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                                        </div>
                                        <div class="modal-body">
                                            <input type="hidden" name="spaceId" th:value="${space.id}">
                                            <div class="mb-3">
                                                <label class="form-label">车牌号</label>
                                                <input type="text" class="form-control" name="plateNumber" required>
                                            </div>
                                        </div>
                                        <div class="modal-footer">
                                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                                            <button type="submit" class="btn btn-primary">确认入场</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>

                        <!-- Reserve Modal -->
                        <div class="modal fade" th:id="'reserveModal'+${space.id}" tabindex="-1">
                            <div class="modal-dialog">
                                <div class="modal-content">
                                    <form th:action="@{/reserve}" method="post">
                                        <div class="modal-header">
                                            <h5 class="modal-title">预约车位 - <span th:text="${space.spaceNumber}"></span></h5>
                                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                                        </div>
                                        <div class="modal-body">
                                            <input type="hidden" name="spaceId" th:value="${space.id}">
                                            <div class="mb-3">
                                                <label class="form-label">预约车牌号</label>
                                                <input type="text" class="form-control" name="plateNumber" required>
                                                <div class="form-text">入场时需使用此车牌号。</div>
                                            </div>
                                        </div>
                                        <div class="modal-footer">
                                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                                            <button type="submit" class="btn btn-warning">确认预约</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
