<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Error - Parking System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card border-danger shadow">
            <div class="card-header bg-danger text-white">
                <h3>系统发生错误 (System Error)</h3>
            </div>
            <div class="card-body">
                <h5 class="card-title text-danger">抱歉，处理您的请求时出现问题。</h5>
                <p class="card-text">
                    <strong>错误信息:</strong> <span th:text="${errorMessage}">Unknown Error</span>
                </p>
                <hr>
                <details>
                    <summary>查看详细堆栈 (Debug Info)</summary>
                    <pre class="mt-2 bg-dark text-light p-3 rounded" th:text="${stackTrace}"></pre>
                </details>
                <div class="mt-4">
                    <a th:href="@{/login}" class="btn btn-primary">返回登录页</a>
                    <a th:href="@{/dashboard}" class="btn btn-secondary">尝试返回控制台</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
