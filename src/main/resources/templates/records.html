<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>停车记录 - 停车场管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">停车场管理系统</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" th:href="@{/dashboard}">车位管理</a></li>
                    <li class="nav-item"><a class="nav-link active" th:href="@{/records}">停车记录</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/reservations}">我的预约</a></li>
                    <li class="nav-item dropdown" th:if="${session.user.role == 'ADMIN'}">
                        <a class="nav-link dropdown-toggle" href="#" id="adminDropdown" role="button" data-bs-toggle="dropdown">
                            管理员功能
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" th:href="@{/admin/users}">用户管理</a></li>
                            <li><a class="dropdown-item" th:href="@{/admin/free-plates}">免费车牌</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" th:href="@{/admin/blacklist}">黑名单管理</a></li>
                            <li><a class="dropdown-item" th:href="@{/admin/violations}">违规记录</a></li>
                        </ul>
                    </li>
                </ul>
                <a th:href="@{/logout}" class="btn btn-outline-light btn-sm">退出登录</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h3>停车历史记录</h3>
        <div class="table-responsive">
            <table class="table table-striped table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>车牌号</th>
                        <th>车位号</th>
                        <th>入场时间</th>
                        <th>出场时间</th>
                        <th>费用 (元)</th>
                        <th>状态</th>
                        <th>支付状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="record : ${records}">
                        <td th:text="${record.id}">1</td>
                        <td th:text="${record.plateNumber}">ABC-123</td>
                        <td th:text="${record.spaceNumber}">A001</td>
                        <td th:text="${#dates.format(record.entryTime, 'yyyy-MM-dd HH:mm:ss')}">2023-01-01 12:00</td>
                        <td th:text="${record.exitTime != null ? #dates.format(record.exitTime, 'yyyy-MM-dd HH:mm:ss') : '-'}">-</td>
                        <td th:text="${record.fee != null ? record.fee : '-'}">-</td>
                        <td>
                            <span th:if="${record.status == 0}" class="badge bg-warning text-dark">停车中</span>
                            <span th:if="${record.status == 1}" class="badge bg-success">已完成</span>
                        </td>
                        <td>
                            <span th:if="${record.paymentStatus == 0 && record.status == 1}" class="badge bg-danger">未支付</span>
                            <span th:if="${record.paymentStatus == 1}" class="badge bg-success">已支付</span>
                            <span th:if="${record.status == 0}">-</span>
                        </td>
                        <td>
                            <form th:if="${record.status == 1 && record.paymentStatus == 0}" th:action="@{/payment/pay}" method="post">
                                <input type="hidden" name="recordId" th:value="${record.id}">
                                <button type="submit" class="btn btn-primary btn-sm">支付</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
