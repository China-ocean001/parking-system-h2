<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>我的预约 - 停车场管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">停车场管理系统</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" th:href="@{/dashboard}">车位管理</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/records}">停车记录</a></li>
                    <li class="nav-item"><a class="nav-link active" th:href="@{/reservations}">我的预约</a></li>
                    <li class="nav-item dropdown" th:if="${session.user.role == 'ADMIN'}">
                        <a class="nav-link dropdown-toggle" href="#" id="adminDropdown" role="button" data-bs-toggle="dropdown">
                            管理员功能
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" th:href="@{/admin/users}">用户管理</a></li>
                            <li><a class="dropdown-item" th:href="@{/admin/free-plates}">免费车牌</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" th:href="@{/admin/blacklist}">黑名单管理</a></li>
                            <li><a class="dropdown-item" th:href="@{/admin/violations}">违规记录</a></li>
                        </ul>
                    </li>
                </ul>
                <a th:href="@{/logout}" class="btn btn-outline-light btn-sm">退出登录</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h3>我的预约记录</h3>
        <div class="table-responsive">
            <table class="table table-striped table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>车位编号</th>
                        <th>预留车牌</th>
                        <th>预约时间</th>
                        <th>状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="res : ${reservations}">
                        <td th:text="${res.id}">1</td>
                        <td th:text="${res.spaceNumber}">A001</td>
                        <td th:text="${res.plateNumber}">ABC-123</td>
                        <td th:text="${#dates.format(res.reserveTime, 'yyyy-MM-dd HH:mm:ss')}">2023-01-01 12:00</td>
                        <td>
                            <span th:if="${res.status == 0}" class="badge bg-primary">有效</span>
                            <span th:if="${res.status == 1}" class="badge bg-success">已使用</span>
                            <span th:if="${res.status == 2}" class="badge bg-secondary">已取消</span>
                        </td>
                        <td>
                            <form th:if="${res.status == 0}" th:action="@{/reservations/cancel}" method="post" onsubmit="return confirm('确定取消预约吗？')">
                                <input type="hidden" name="reservationId" th:value="${res.id}">
                                <button type="submit" class="btn btn-warning btn-sm">取消预约</button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
