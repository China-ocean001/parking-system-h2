<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>用户管理 - 停车场管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">停车场管理系统</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" th:href="@{/dashboard}">车位管理</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/records}">停车记录</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/reservations}">我的预约</a></li>
                    <li class="nav-item dropdown" th:if="${session.user.role == 'ADMIN'}">
                        <a class="nav-link dropdown-toggle active" href="#" id="adminDropdown" role="button" data-bs-toggle="dropdown">
                            管理员功能
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" th:href="@{/admin/users}">用户管理</a></li>
                            <li><a class="dropdown-item" th:href="@{/admin/free-plates}">免费车牌</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" th:href="@{/admin/blacklist}">黑名单管理</a></li>
                            <li><a class="dropdown-item" th:href="@{/admin/violations}">违规记录</a></li>
                        </ul>
                    </li>
                </ul>
                <a th:href="@{/logout}" class="btn btn-outline-light btn-sm">退出登录</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <!-- Add User Form -->
        <div class="card mb-4">
            <div class="card-header">添加新用户</div>
            <div class="card-body">
                <form th:action="@{/admin/users/add}" method="post" class="row g-3">
                    <div class="col-auto">
                        <input type="text" class="form-control" name="username" placeholder="用户名" required>
                    </div>
                    <div class="col-auto">
                        <input type="password" class="form-control" name="password" placeholder="密码" required>
                    </div>
                    <div class="col-auto">
                        <select class="form-select" name="role">
                            <option value="USER">普通用户</option>
                            <option value="ADMIN">管理员</option>
                        </select>
                    </div>
                    <div class="col-auto">
                        <button type="submit" class="btn btn-success">添加用户</button>
                    </div>
                </form>
            </div>
        </div>

        <h3>系统用户列表</h3>
        <div class="table-responsive">
            <table class="table table-striped table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>用户名</th>
                        <th>角色</th>
                        <th>创建时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="u : ${users}">
                        <td th:text="${u.id}">1</td>
                        <td th:text="${u.username}">admin</td>
                        <td>
                            <span th:if="${u.role == 'ADMIN'}" class="badge bg-danger">管理员</span>
                            <span th:if="${u.role == 'USER'}" class="badge bg-primary">普通用户</span>
                        </td>
                        <td th:text="${#dates.format(u.createTime, 'yyyy-MM-dd HH:mm:ss')}">2023-01-01</td>
                        <td>
                            <a th:if="${u.username != 'admin'}" th:href="@{/admin/users/delete(id=${u.id})}" class="btn btn-danger btn-sm" onclick="return confirm('确定要删除该用户吗？')">删除</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
