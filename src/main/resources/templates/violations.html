<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>违规记录 - 停车场管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">停车场管理系统</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" th:href="@{/dashboard}">车位管理</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/records}">停车记录</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/reservations}">我的预约</a></li>
                    <li class="nav-item dropdown" th:if="${session.user.role == 'ADMIN'}">
                        <a class="nav-link dropdown-toggle active" href="#" id="adminDropdown" role="button" data-bs-toggle="dropdown">
                            管理员功能
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" th:href="@{/admin/users}">用户管理</a></li>
                            <li><a class="dropdown-item" th:href="@{/admin/free-plates}">免费车牌</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" th:href="@{/admin/blacklist}">黑名单管理</a></li>
                            <li><a class="dropdown-item active" th:href="@{/admin/violations}">违规记录</a></li>
                        </ul>
                    </li>
                </ul>
                <a th:href="@{/logout}" class="btn btn-outline-light btn-sm">退出登录</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <!-- Add Violation Form -->
        <div class="card mb-4 border-warning">
            <div class="card-header bg-warning text-dark">登记违规车辆</div>
            <div class="card-body">
                <form th:action="@{/admin/violations/add}" method="post" class="row g-3">
                    <div class="col-md-3">
                        <input type="text" class="form-control" name="plateNumber" placeholder="车牌号" required>
                    </div>
                    <div class="col-md-3">
                        <select class="form-select" name="type">
                            <option value="乱停乱放">乱停乱放</option>
                            <option value="占用消防通道">占用消防通道</option>
                            <option value="损坏设施">损坏设施</option>
                            <option value="逃费">逃费</option>
                            <option value="其他">其他</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <input type="text" class="form-control" name="description" placeholder="详细描述">
                    </div>
                    <div class="col-md-2">
                        <button type="submit" class="btn btn-warning w-100">记录违规</button>
                    </div>
                </form>
            </div>
        </div>

        <h3>违规历史记录</h3>
        <div class="table-responsive">
            <table class="table table-striped table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>车牌号</th>
                        <th>违规类型</th>
                        <th>描述</th>
                        <th>记录时间</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="v : ${violations}">
                        <td th:text="${v.id}">1</td>
                        <td th:text="${v.plateNumber}" class="fw-bold">ABC-123</td>
                        <td><span class="badge bg-warning text-dark" th:text="${v.violationType}">乱停乱放</span></td>
                        <td th:text="${v.description}">...</td>
                        <td th:text="${#dates.format(v.recordTime, 'yyyy-MM-dd HH:mm:ss')}">2023-01-01</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
